{% extends "base.html" %}
{% block title %}Inscrire un étudiant — Edu.CRM{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Inscrire un étudiant</h1>
  <a href="{{ url_for('courses.list_courses') }}" class="btn btn-secondary">← Retour</a>
</div>

<div class="form-card">
  <p style="color:var(--muted); margin-bottom:1.5rem; font-size:0.9rem">
    Cours : <strong style="color:var(--text)">{{ course.title }}</strong>
  </p>
  <form method="POST">
    <div class="form-group">
      <label>Étudiant</label>
      <select name="student_id" required>
        <option value="">-- Choisir un étudiant --</option>
        {% for student in students %}
          <option value="{{ student.id }}">{{ student.prenom }} {{ student.nom }}</option>
        {% endfor %}
      </select>
    </div>
    <button type="submit" class="btn btn-primary">Inscrire</button>
  </form>
</div>
{% endblock %}
