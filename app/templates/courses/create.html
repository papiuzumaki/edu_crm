{% extends "base.html" %}
{% block title %}Créer un cours — Edu.CRM{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Créer un cours</h1>
  <a href="{{ url_for('courses.list_courses') }}" class="btn btn-secondary">← Retour</a>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('courses.create_course') }}">
    <div class="form-group">
      <label>Titre du cours</label>
      <input type="text" name="title" placeholder="Ex: Algorithmique avancée" required />
    </div>
    <div class="form-group">
      <label>Enseignant responsable</label>
      <select name="teacher_id" required>
        <option value="">-- Choisir un enseignant --</option>
        {% for teacher in teachers %}
          <option value="{{ teacher.id }}">{{ teacher.name }} — {{ teacher.speciality }}</option>
        {% endfor %}
      </select>
    </div>
    <button type="submit" class="btn btn-primary">Créer le cours</button>
  </form>
</div>
{% endblock %}
