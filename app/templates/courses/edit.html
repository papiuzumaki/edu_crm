{% extends "base.html" %}
{% block title %}Modifier un cours — Edu.CRM{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Modifier un cours</h1>
  <a href="{{ url_for('courses.list_courses') }}" class="btn btn-secondary">← Retour</a>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('courses.edit_course', course_id=course.id) }}">
    <div class="form-group">
      <label>Titre du cours</label>
      <input type="text" name="title" value="{{ course.title }}" required />
    </div>
    <div class="form-group">
      <label>Enseignant responsable</label>
      <select name="teacher_id" required>
        <option value="">-- Choisir un enseignant --</option>
        {% for teacher in teachers %}
          <option value="{{ teacher.id }}" {% if teacher.id == course.teacher_id %}selected{% endif %}>
            {{ teacher.name }} — {{ teacher.speciality }}
          </option>
        {% endfor %}
      </select>
    </div>
    <button type="submit" class="btn btn-primary">Enregistrer</button>
  </form>
</div>
{% endblock %}
