{% extends "base.html" %}
{% block title %}Ajouter un étudiant — Edu.CRM{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Ajouter un étudiant</h1>
  <a href="{{ url_for('students.list_students') }}" class="btn btn-secondary">← Retour</a>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('students.create_student') }}">
    <div class="form-group">
      <label>Nom</label>
      <input type="text" name="nom" placeholder="Ex: Diallo" required />
    </div>
    <div class="form-group">
      <label>Prénom</label>
      <input type="text" name="prenom" placeholder="Ex: Moussa" required />
    </div>
    <div class="form-group">
      <label>Date de naissance</label>
      <input type="date" name="date_naissance" />
    </div>
    <div class="form-group">
      <label>Classe</label>
      <input type="text" name="classe" placeholder="Ex: Terminale A" required />
    </div>
    <div class="form-group">
      <label>Matricule</label>
      <input type="text" name="matricule" placeholder="Ex: ETU-2024-001" required />
    </div>
    <button type="submit" class="btn btn-primary">Ajouter l'étudiant</button>
  </form>
</div>
{% endblock %}
