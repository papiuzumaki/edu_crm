{% extends "base.html" %}
{% block title %}Modifier un étudiant — Edu.CRM{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Modifier l'étudiant</h1>
  <a href="{{ url_for('students.list_students') }}" class="btn btn-secondary">← Retour</a>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('students.edit_student', student_id=student.id) }}">
    <div class="form-group">
      <label>Nom</label>
      <input type="text" name="nom" value="{{ student.nom }}" required />
    </div>
    <div class="form-group">
      <label>Prénom</label>
      <input type="text" name="prenom" value="{{ student.prenom }}" required />
    </div>
    <div class="form-group">
      <label>Date de naissance</label>
      <input type="date" name="date_naissance" value="{{ student.date_naissance }}" />
    </div>
    <div class="form-group">
      <label>Classe</label>
      <input type="text" name="classe" value="{{ student.classe }}" required />
    </div>
    <div class="form-group">
      <label>Matricule</label>
      <input type="text" name="matricule" value="{{ student.matricule }}" required />
    </div>
    <button type="submit" class="btn btn-primary">Enregistrer les modifications</button>
  </form>
</div>
{% endblock %}
