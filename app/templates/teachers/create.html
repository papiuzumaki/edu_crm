{% extends "base.html" %}
{% block title %}Ajouter un enseignant — Edu.CRM{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Ajouter un enseignant</h1>
  <a href="{{ url_for('teachers.list_teachers') }}" class="btn btn-secondary">← Retour</a>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('teachers.create_teacher') }}">
    <div class="form-group">
      <label>Nom complet</label>
      <input type="text" name="name" placeholder="Ex: Dr. Aminata Sow" required />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="Ex: aminata@ecole.com" required />
    </div>
    <div class="form-group">
      <label>Spécialité</label>
      <input type="text" name="speciality" placeholder="Ex: Informatique" required />
    </div>
    <button type="submit" class="btn btn-primary">Ajouter l'enseignant</button>
  </form>
</div>
{% endblock %}
