{% extends "base.html" %}
{% block title %}Modifier un enseignant — Edu.CRM{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Modifier l'enseignant</h1>
  <a href="{{ url_for('teachers.list_teachers') }}" class="btn btn-secondary">← Retour</a>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('teachers.edit_teacher', teacher_id=teacher.id) }}">
    <div class="form-group">
      <label>Nom complet</label>
      <input type="text" name="name" value="{{ teacher.name }}" required />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" value="{{ teacher.email }}" required />
    </div>
    <div class="form-group">
      <label>Spécialité</label>
      <input type="text" name="speciality" value="{{ teacher.speciality }}" required />
    </div>
    <button type="submit" class="btn btn-primary">Enregistrer les modifications</button>
  </form>
</div>
{% endblock %}
